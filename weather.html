<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Overlay</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: transparent;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
        }
        .weather-container {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 5px 14px;
            background: linear-gradient(90deg, rgba(46,139,87,0.85), rgba(112,128,144,0.85));
            border-radius: 15px;
            font-size: 24px;
            font-weight: 700;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="weather-container" id="weather">
        <span id="icon">🌍</span>
        <span id="weather-text">Fetching weather...</span>
        <span id="weather-mood"></span>
        <span id="temp-mood"></span>
    </div>

    <script>
        let cachedCity = "";
        let cachedCountry = "";
        let cachedWeather = "";
        let cachedTemp = 0;
        let cachedWind = 0;

        const weatherIcons = {
            "Sunny": "☀️", "Clear": "☀️",
            "Partly cloudy": "⛅", "Cloudy": "☁️", "Overcast": "☁️",
            "Mist": "🌫️", "Fog": "🌫️", "Freezing fog": "🌫️",
            "Patchy rain": "🌦️", "Light rain": "🌦️", "Drizzle": "🌦️",
            "Moderate rain": "🌧️", "Heavy rain": "🌧️",
            "Snow": "❄️", "Blizzard": "❄️", "Sleet": "🌨️",
            "Thunder": "⛈️", "Thunderstorm": "⛈️"
        };

        function getIcon(desc) {
            for (const key of Object.keys(weatherIcons)) {
                if (desc.toLowerCase().includes(key.toLowerCase())) return weatherIcons[key];
            }
            return "🌍";
        }

        function getWeatherMood(desc) {
            const d = desc.toLowerCase();
            if (d.includes("sun") || d.includes("clear"))   return "Sun's Out, Buns Out 🌞🦊";
            if (d.includes("thunder"))                       return "Thunder Fright, Hold Tight ⚡🦊";
            if (d.includes("snow") || d.includes("blizzard"))return "Snow Fox, Slow Fox ❄️🦊";
            if (d.includes("rain") || d.includes("drizzle")) return "Wet Fox, Sad Fox 🌧️🦊";
            if (d.includes("mist") || d.includes("fog"))    return "Lost Fox, Fog Boss 🌫️🦊";
            if (d.includes("cloud") || d.includes("overcast"))return "Clouds, No Crowds ⛅🦊";
            return "Fox Says, Meh 🤷🦊";
        }

        function getTempMood(temp) {
            if (temp > 32)      return "Fox on Fire, Send Help 🔥🦊";
            if (temp > 26)      return "Sweaty Fox, Hot Rocks 🥵🦊";
            if (temp < 0)       return "Fox Icicle, Survival? 🚨🦊";
            if (temp < 10)      return "Frozen Fox, No Socks 🥶🦊";
            if (temp < 16)      return "Chilly Fox, Still Rocks 🧥🦊";
            return "Perfect Ride, Fox Pride 😍🦊";
        }

        function getTimeStrings() {
            const now = new Date();
            const hh  = now.getHours().toString().padStart(2,'0');
            const mm  = now.getMinutes().toString().padStart(2,'0');
            const dd  = now.getDate().toString().padStart(2,'0');
            const mo  = (now.getMonth()+1).toString().padStart(2,'0');
            const yy  = now.getFullYear();
            return { time: `${hh}:${mm}`, date: `${dd}/${mo}/${yy}` };
        }

        function updateDisplay() {
            const { time, date } = getTimeStrings();
            document.getElementById("icon").textContent = getIcon(cachedWeather);
            document.getElementById("weather-text").textContent =
                `${cachedCity}, ${cachedCountry}: ${cachedTemp}°C, ${cachedWeather}, Wind: ${cachedWind} m/s | ${date} 📅 ${time} 🕒`;
            document.getElementById("weather-mood").textContent = getWeatherMood(cachedWeather);
            document.getElementById("temp-mood").textContent = getTempMood(cachedTemp);
        }

        async function fetchWeather() {
            try {
                // wttr.in — HTTPS, IP-põhine asukoht, tasuta, ei vaja API võtit
                const res  = await fetch("https://wttr.in/?format=j1");
                const data = await res.json();

                const cur     = data.current_condition[0];
                const area    = data.nearest_area[0];

                cachedTemp    = Math.round(parseFloat(cur.temp_C));
                cachedWind    = Math.round(parseFloat(cur.windspeedKmph) / 3.6); // km/h → m/s
                cachedWeather = cur.weatherDesc[0].value;
                cachedCity    = area.areaName[0].value;
                cachedCountry = area.country[0].value;

                updateDisplay();
            } catch (err) {
                document.getElementById("weather-text").textContent = "Weather unavailable";
                document.getElementById("weather-mood").textContent = "Fox Confused 🤯🦊";
                document.getElementById("temp-mood").textContent = "";
            }
        }

        fetchWeather();
        setInterval(fetchWeather, 600000);   // ilm iga 10 min
        setInterval(updateDisplay, 60000);    // kell iga minut
    </script>
</body>
</html>
